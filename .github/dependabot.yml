version: 2
updates:
  # The workflows pin every action to a full commit SHA, so an update is only
  # visible to Dependabot — never to a floating tag.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # codeql-action ships its steps as separate sub-action paths (init,
    # autobuild, analyze) that share a single release SHA. Ungrouped, one
    # release lands as three PRs editing adjacent lines of the same workflow.
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
